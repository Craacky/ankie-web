services:
  backend:
    build:
      context: ./backend
    container_name: ankie-backend
    environment:
      - DB_PATH=/data/ankie.db
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-}
      - SESSION_TTL_DAYS=${SESSION_TTL_DAYS:-30}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - ENABLE_API_DOCS=${ENABLE_API_DOCS:-true}
      - DISABLE_RATE_LIMITING=${DISABLE_RATE_LIMITING:-false}
      - ALLOW_CORS_ANY=${ALLOW_CORS_ANY:-false}
      - ALLOW_UNSAFE_NOTES_ROOT=${ALLOW_UNSAFE_NOTES_ROOT:-true}
      - CARD_QUESTION_MAX_CHARS=${CARD_QUESTION_MAX_CHARS:-2000}
      - CARD_ANSWER_MAX_CHARS=${CARD_ANSWER_MAX_CHARS:-8000}
      - ADMIN_TELEGRAM_IDS=${ADMIN_TELEGRAM_IDS:-}
      - TELEGRAM_ADMIN_CHAT_ID=${TELEGRAM_ADMIN_CHAT_ID:-}
      - REQUEST_LOG_RETENTION_DAYS=${REQUEST_LOG_RETENTION_DAYS:-14}
      - ALERT_CHECK_INTERVAL_SECONDS=${ALERT_CHECK_INTERVAL_SECONDS:-60}
      - ALERT_WINDOW_SECONDS=${ALERT_WINDOW_SECONDS:-60}
      - ALERT_REQUESTS_THRESHOLD=${ALERT_REQUESTS_THRESHOLD:-120}
      - ALERT_ERROR_THRESHOLD=${ALERT_ERROR_THRESHOLD:-30}
      - NOTES_ROOT=${NOTES_ROOT:-/data/notes}
    volumes:
      - ankie_data:/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: ankie-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  ankie_data:
