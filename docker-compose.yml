services:
  backend:
    build:
      context: ./backend
    container_name: ankie-backend
    environment:
      - DB_PATH=/data/ankie.db
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-}
      - SESSION_TTL_DAYS=${SESSION_TTL_DAYS:-30}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - NOTES_ROOT=${NOTES_ROOT:-/data/notes}
    volumes:
      - ankie_data:/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: ankie-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  ankie_data:
