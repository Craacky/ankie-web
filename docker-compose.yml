services:
  backend:
    build:
      context: ./backend
    container_name: ankie-backend
    environment:
      - DB_PATH=/data/ankie.db
    volumes:
      - ankie_data:/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: ankie-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  ankie_data:
