services:
  backend:
    build:
      context: ./backend
    environment:
      - DB_PATH=/data/ankie.db
    volumes:
      - ankie_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2.9-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  ankie_data:
  caddy_data:
  caddy_config:
