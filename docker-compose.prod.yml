services:
  backend:
    build:
      context: ./backend
    environment:
      - DB_PATH=/data/ankie.db
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME}
      - SESSION_TTL_DAYS=${SESSION_TTL_DAYS:-30}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - AUTO_IMPORT_SOURCES=${AUTO_IMPORT_SOURCES:-true}
      - SOURCES_PATH=/sources
      - NOTES_BOOTSTRAP_REPO=${NOTES_BOOTSTRAP_REPO:-}
      - NOTES_BOOTSTRAP_BRANCH=${NOTES_BOOTSTRAP_BRANCH:-master}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - NOTES_ROOT=${NOTES_ROOT:-/data/notes}
    volumes:
      - ankie_data:/data
      - ./Sources:/sources:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2.9-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  ankie_data:
  caddy_data:
  caddy_config:
