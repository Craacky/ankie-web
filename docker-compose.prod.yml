services:
  backend:
    build:
      context: ./backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    environment:
      - DB_PATH=/data/ankie.db
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME}
      - SESSION_TTL_DAYS=${SESSION_TTL_DAYS:-30}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - ENABLE_API_DOCS=${ENABLE_API_DOCS:-false}
      - DISABLE_RATE_LIMITING=${DISABLE_RATE_LIMITING:-false}
      - ALLOW_CORS_ANY=${ALLOW_CORS_ANY:-false}
      - ALLOW_UNSAFE_NOTES_ROOT=${ALLOW_UNSAFE_NOTES_ROOT:-false}
      - CARD_QUESTION_MAX_CHARS=${CARD_QUESTION_MAX_CHARS:-2000}
      - CARD_ANSWER_MAX_CHARS=${CARD_ANSWER_MAX_CHARS:-8000}
      - ADMIN_TELEGRAM_IDS=${ADMIN_TELEGRAM_IDS:-}
      - TELEGRAM_ADMIN_CHAT_ID=${TELEGRAM_ADMIN_CHAT_ID:-}
      - REQUEST_LOG_RETENTION_DAYS=${REQUEST_LOG_RETENTION_DAYS:-14}
      - ALERT_CHECK_INTERVAL_SECONDS=${ALERT_CHECK_INTERVAL_SECONDS:-60}
      - ALERT_WINDOW_SECONDS=${ALERT_WINDOW_SECONDS:-60}
      - ALERT_REQUESTS_THRESHOLD=${ALERT_REQUESTS_THRESHOLD:-120}
      - ALERT_ERROR_THRESHOLD=${ALERT_ERROR_THRESHOLD:-30}
      - NOTES_ROOT=${NOTES_ROOT:-/data/notes}
    volumes:
      - ankie_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2.9-alpine
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  ankie_data:
  caddy_data:
  caddy_config:
