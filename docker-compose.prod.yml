services:
  backend:
    build:
      context: ./backend
    environment:
      - DB_PATH=/data/ankie.db
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME}
      - SESSION_TTL_DAYS=${SESSION_TTL_DAYS:-30}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - ENABLE_API_DOCS=${ENABLE_API_DOCS:-false}
      - DISABLE_RATE_LIMITING=${DISABLE_RATE_LIMITING:-false}
      - ALLOW_CORS_ANY=${ALLOW_CORS_ANY:-false}
      - ALLOW_UNSAFE_NOTES_ROOT=${ALLOW_UNSAFE_NOTES_ROOT:-false}
      - CARD_QUESTION_MAX_CHARS=${CARD_QUESTION_MAX_CHARS:-2000}
      - CARD_ANSWER_MAX_CHARS=${CARD_ANSWER_MAX_CHARS:-8000}
      - NOTES_ROOT=${NOTES_ROOT:-/data/notes}
    volumes:
      - ankie_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2.9-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  ankie_data:
  caddy_data:
  caddy_config:
